name: Update neofetch profile

on:
  schedule:
    - cron: "17 18 * * *"
  push:
    paths:
      - "README.md"
      - "scripts/generate_neofetch.py"
      - ".github/workflows/update-neofetch.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install renderer dependencies
        run: python -m pip install --upgrade pillow

      - name: Generate neofetch SVG
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE_USER: tami-bang
          PROFILE_NAME: Tami Bang
          PROFILE_BIRTHDAY: ${{ vars.PROFILE_BIRTHDAY }}
        run: python scripts/generate_neofetch.py

      - name: Commit generated profile
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update generated neofetch profile"
          file_pattern: assets/neofetch-light.svg assets/neofetch-dark.svg
